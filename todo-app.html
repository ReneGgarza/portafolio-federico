<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aplicación de Tareas - To-Do List</title>
  <link rel="stylesheet" href="todo-style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>📋 Mi Lista de Tareas</h1>
      <p>Gestiona tus tareas de forma simple y eficiente</p>
    </header>

    <main class="main-content">
      <!-- Entrada de nueva tarea -->
      <div class="input-section">
        <input
          type="text"
          id="todoInput"
          class="todo-input"
          placeholder="Escribe una nueva tarea..."
          autocomplete="off"
        />
        <button id="addBtn" class="add-btn">➕ Agregar</button>
      </div>

      <!-- Filtros -->
      <div class="filters">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="active">Activas</button>
        <button class="filter-btn" data-filter="completed">Completadas</button>
      </div>

      <!-- Lista de tareas -->
      <section class="tasks-section">
        <ul id="todoList" class="todo-list">
          <!-- Las tareas se cargan aquí dinámicamente -->
        </ul>
      </section>

      <!-- Estadísticas -->
      <div class="stats">
        <p>Total: <span id="totalTasks">0</span></p>
        <p>Completadas: <span id="completedTasks">0</span></p>
        <p>Pendientes: <span id="activeTasks">0</span></p>
      </div>

      <!-- Botón para limpiar completadas -->
      <div class="actions">
        <button id="clearBtn" class="clear-btn">🗑️ Limpiar Completadas</button>
        <button id="clearAllBtn" class="clear-all-btn">🔄 Limpiar Todo</button>
      </div>
    </main>

    <footer class="footer">
      <p>Aplicación de tareas con almacenamiento local</p>
    </footer>
  </div>

  <script src="todo-script.js"></script>
</body>
</html>
